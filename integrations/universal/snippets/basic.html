<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>AI Avatar - Minimal Embed</title>
</head>
<body>
  <h1>My Website</h1>
  <p>Open browser console (F12) to see SDK loading. The chat bubble should appear in the bottom-right corner.</p>

  <!-- =================================================
       AI Avatar - the only 2 lines you need
       Replace token and agent-id with values from
       https://avataraisdk.com console
       ================================================= -->
  <script src="https://embed.avataraisdk.com/widget.iife.js" async></script>
  <ai-avatar
    token="YOUR_API_KEY"
    agent-id="YOUR_AGENT_ID"
  ></ai-avatar>
</body>
</html>
