# Shopify App configuration
# Generated by `shopify app init` then customized.
# Docs: https://shopify.dev/docs/apps/build/cli-for-apps/app-configuration

# 下面 client_id 是占位符 —— Partners Dashboard 创建 app 后填真实值
# (或者跑 `shopify app config link` 自动填)
client_id = "TBD_REPLACE_AFTER_CREATING_APP_IN_PARTNERS_DASHBOARD"

name = "AI Avatar - 3D Digital Human Chat"
handle = "ai-avatar"
application_url = "https://avataraisdk.com"

# embedded = false 因为我们没有 Shopify Admin 内嵌 UI
# 整个 app 功能就是一个 Theme App Extension (Embed Block),
# 商家在主题编辑器里启用 + 填 API Key, 不需要进 app 后台
embedded = false

[access_scopes]
# Theme App Extension 不需要 admin API 权限 —— 它只是注入主题代码
# 留空 = 无 OAuth scope 请求, 商家安装时不会看到权限弹窗
scopes = ""

[auth]
# OAuth 回调 URL —— 即便我们不用 OAuth, Shopify 也要求填一个
# 等有官网了把这个改成 https://avataraisdk.com/shopify/auth/callback
redirect_urls = ["https://avataraisdk.com/shopify/auth/callback"]

[webhooks]
api_version = "2024-10"

[pos]
embedded = false

[build]
include_config_on_deploy = true
