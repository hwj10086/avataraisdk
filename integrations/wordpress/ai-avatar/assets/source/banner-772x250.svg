<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 772 250" width="772" height="250">
  <!--
    Banner used for both WordPress.org plugin listing (772x250 / 1544x500 retina)
    and the GitHub repo Social Preview.
    Layout: large icon on the left, title + subtitle + 3 feature tags on the right.
  -->
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#FAFAFC"/>
      <stop offset="1" stop-color="#EEF1FF"/>
    </linearGradient>
    <linearGradient id="iconBg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#6366F1"/>
      <stop offset="1" stop-color="#8B5CF6"/>
    </linearGradient>
    <filter id="iconShadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="8" stdDeviation="12" flood-color="#6366F1" flood-opacity="0.25"/>
    </filter>
  </defs>

  <!-- Background -->
  <rect width="772" height="250" fill="url(#bg)"/>

  <!-- Left icon (172x172, vertically centered) -->
  <g transform="translate(48,39)" filter="url(#iconShadow)">
    <rect width="172" height="172" rx="38" ry="38" fill="url(#iconBg)"/>
    <g transform="translate(38,35)">
      <path
        d="M48 8
           C24.32 8 8 25.65 8 48
           c0 7.28 1.96 14.12 5.36 20
           L8 88
           l20 -5.36
           C33.88 86.04 40.72 88 48 88
           c22.08 0 40 -17.92 40 -40
           S70.08 8 48 8 z"
        fill="rgba(255,255,255,0.18)"
        stroke="white"
        stroke-width="6"
        stroke-linejoin="round"/>
      <circle cx="32" cy="48" r="6" fill="white"/>
      <circle cx="48" cy="48" r="6" fill="white"/>
      <circle cx="64" cy="48" r="6" fill="white"/>
    </g>
  </g>

  <!-- Right text area (starts at x=260) -->
  <g transform="translate(260,0)">
    <!-- Title -->
    <text x="0" y="94"
          font-family="-apple-system, 'Segoe UI', Inter, Roboto, sans-serif"
          font-size="48"
          font-weight="800"
          fill="#1F2937">avataraisdk</text>

    <!-- Subtitle -->
    <text x="0" y="134"
          font-family="-apple-system, 'Segoe UI', Inter, Roboto, sans-serif"
          font-size="18"
          font-weight="500"
          fill="#4B5563">Drop-in 3D AI Avatar Widget for Any Website</text>

    <!-- Three feature tags -->
    <g transform="translate(0,166)" font-family="-apple-system, 'Segoe UI', Inter, Roboto, sans-serif" font-size="13" font-weight="600">
      <g>
        <rect width="98" height="32" rx="16" ry="16" fill="#EEF2FF" stroke="#6366F1" stroke-width="1.5"/>
        <text x="49" y="21" text-anchor="middle" fill="#4F46E5">Voice Chat</text>
      </g>
      <g transform="translate(110,0)">
        <rect width="86" height="32" rx="16" ry="16" fill="#EEF2FF" stroke="#6366F1" stroke-width="1.5"/>
        <text x="43" y="21" text-anchor="middle" fill="#4F46E5">Lip Sync</text>
      </g>
      <g transform="translate(208,0)">
        <rect width="98" height="32" rx="16" ry="16" fill="#EEF2FF" stroke="#6366F1" stroke-width="1.5"/>
        <text x="49" y="21" text-anchor="middle" fill="#4F46E5">3-min Setup</text>
      </g>
    </g>
  </g>
</svg>
