<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1280 640" width="1280" height="640">
  <!--
    GitHub Social Preview (1280×640, 2:1 — GitHub's recommended best-display size).
    Layout: large icon on the left + title / subtitle / 3 feature tags on the right,
    proportions optimized for the squarer aspect ratio.
  -->
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#FAFAFC"/>
      <stop offset="1" stop-color="#EEF1FF"/>
    </linearGradient>
    <linearGradient id="iconBg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#6366F1"/>
      <stop offset="1" stop-color="#8B5CF6"/>
    </linearGradient>
    <filter id="iconShadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="14" stdDeviation="20" flood-color="#6366F1" flood-opacity="0.28"/>
    </filter>
  </defs>

  <!-- Background -->
  <rect width="1280" height="640" fill="url(#bg)"/>

  <!-- Left icon (320×320, vertically centered) -->
  <g transform="translate(120,160)" filter="url(#iconShadow)">
    <rect width="320" height="320" rx="72" ry="72" fill="url(#iconBg)"/>
    <g transform="translate(70,65)">
      <path
        d="M90 15
           C44.85 15 15 47.85 15 90
           c0 13.5 3.65 26.25 9.95 37.2
           L15 165
           l37.2 -9.95
           C63.1 161.35 75.85 165 90 165
           c41.2 0 75 -33.8 75 -75
           S131.2 15 90 15 z"
        fill="rgba(255,255,255,0.18)"
        stroke="white"
        stroke-width="11"
        stroke-linejoin="round"/>
      <circle cx="60" cy="90" r="11" fill="white"/>
      <circle cx="90" cy="90" r="11" fill="white"/>
      <circle cx="120" cy="90" r="11" fill="white"/>
    </g>
  </g>

  <!-- Right text area (starts at x=510) -->
  <g transform="translate(510,0)">
    <!-- Title -->
    <text x="0" y="270"
          font-family="-apple-system, 'Segoe UI', Inter, Roboto, sans-serif"
          font-size="92"
          font-weight="800"
          fill="#1F2937">avataraisdk</text>

    <!-- Subtitle -->
    <text x="0" y="332"
          font-family="-apple-system, 'Segoe UI', Inter, Roboto, sans-serif"
          font-size="28"
          font-weight="500"
          fill="#4B5563">Drop-in 3D AI Avatar Widget for Any Website</text>

    <!-- Three feature tags -->
    <g transform="translate(0,378)" font-family="-apple-system, 'Segoe UI', Inter, Roboto, sans-serif" font-size="20" font-weight="600">
      <g>
        <rect width="148" height="48" rx="24" ry="24" fill="#EEF2FF" stroke="#6366F1" stroke-width="2"/>
        <text x="74" y="32" text-anchor="middle" fill="#4F46E5">Voice Chat</text>
      </g>
      <g transform="translate(168,0)">
        <rect width="128" height="48" rx="24" ry="24" fill="#EEF2FF" stroke="#6366F1" stroke-width="2"/>
        <text x="64" y="32" text-anchor="middle" fill="#4F46E5">Lip Sync</text>
      </g>
      <g transform="translate(316,0)">
        <rect width="156" height="48" rx="24" ry="24" fill="#EEF2FF" stroke="#6366F1" stroke-width="2"/>
        <text x="78" y="32" text-anchor="middle" fill="#4F46E5">3-min Setup</text>
      </g>
    </g>
  </g>
</svg>
